<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thảo Thỏ - Deal Shopee</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #0d0d0d; --dark2: #141414; --dark3: #1c1c1c; --dark4: #252525;
      --text: #e8e8e8; --text2: #aaa;
      --orange: #ee4d2d; --orange2: #d63c1e;
      --green: #22c55e; --gold: #f5c842; --radius: 14px;
    }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--dark); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px 16px;
    }
    .card {
      background: var(--dark2); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 36px 32px;
      width: 100%; max-width: 520px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-icon {
      width: 44px; height: 44px; background: var(--orange);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
    }
    .logo-text h1 { font-size: 1.2rem; font-weight: 800; }
    .logo-text p  { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
    textarea {
      width: 100%; background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.09); border-radius: var(--radius);
      padding: 14px 16px; color: var(--text); font-family: inherit;
      font-size: 0.9rem; line-height: 1.5; resize: none; height: 96px;
      transition: border-color 0.2s; outline: none; margin-bottom: 16px;
    }
    textarea:focus { border-color: var(--orange); }
    textarea::placeholder { color: var(--text2); opacity: 0.6; }

    .platform-label {
      font-size: 0.75rem; color: var(--text2); margin-bottom: 8px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .platform-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .platform-btn {
      background: var(--dark3); border: 2px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 10px 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      transition: all 0.18s; text-align: center;
    }
    .platform-btn:hover { border-color: rgba(255,255,255,0.2); background: var(--dark4); }
    .platform-btn.active.fb  { border-color: #1877f2; background: rgba(24,119,242,0.13); }
    .platform-btn.active.ig  { border-color: #e1306c; background: rgba(225,48,108,0.13); }
    .platform-btn.active.tt  { border-color: #69c9d0; background: rgba(105,201,208,0.11); }
    .platform-btn.active.zl  { border-color: #0068ff; background: rgba(0,104,255,0.13); }
    .platform-btn .p-icon { font-size: 1.35rem; line-height: 1; }
    .platform-btn .p-name { font-size: 0.7rem; font-weight: 700; color: var(--text2); }
    .platform-btn.active .p-name { color: var(--text); }

    .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn {
      flex: 1; padding: 12px 14px; border-radius: 10px; border: none;
      cursor: pointer; font-family: inherit; font-size: 0.88rem; font-weight: 700;
      transition: all 0.18s; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .btn-paste {
      background: var(--dark4); color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      flex: 0 0 auto; padding: 12px 18px;
    }
    .btn-paste:hover { background: #2e2e2e; }
    .btn-convert { background: var(--orange); color: #fff; }
    .btn-convert:hover:not(:disabled) { background: var(--orange2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(238,77,45,0.3); }
    .btn-convert:disabled { opacity: 0.65; cursor: not-allowed; transform: none !important; }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 12px 16px; color: #f87171;
      font-size: 0.85rem; margin-bottom: 14px; display: none;
    }
    .error-msg.show { display: block; }
    .result-wrap { display: none; }
    .result-wrap.show { display: block; }
    .result-box {
      background: var(--dark3); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 14px; font-size: 0.76rem;
      color: var(--text2); word-break: break-all; line-height: 1.6;
      margin-bottom: 10px; max-height: 86px; overflow-y: auto;
    }
    .action-row { display: flex; gap: 10px; }
    .btn-copy { background: var(--green); color: #fff; }
    .btn-copy:hover { background: #16a34a; }
    .btn-open { background: var(--orange); color: #fff; }
    .btn-open:hover { background: var(--orange2); }
    .tip {
      margin-top: 20px; padding: 12px 16px;
      background: rgba(245,200,66,0.05); border: 1px solid rgba(245,200,66,0.12);
      border-radius: 10px; font-size: 0.79rem; color: var(--text2); line-height: 1.7;
    }
    .tip strong { color: var(--gold); }
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green); color: #fff; padding: 12px 24px;
      border-radius: 50px; font-weight: 600; font-size: 0.9rem;
      transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    footer { margin-top: 20px; font-size: 0.72rem; color: var(--text2); text-align: center; opacity: 0.4; }
    @media (max-width: 400px) {
      .card { padding: 22px 14px; }
      .platform-btn .p-name { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛍️</div>
    <div class="logo-text">
      <h1>Thảo Thỏ - Deal Shopee</h1>
      <p>Dán link → nhận voucher độc quyền</p>
    </div>
  </div>

  <textarea id="inputLink" placeholder="Dán link Shopee vào đây...&#10;VD: https://shopee.vn/... hoặc shp.ee/..."></textarea>

  <div class="platform-label">Chọn nền tảng nhận voucher</div>
  <div class="platform-grid">
    <button class="platform-btn fb active" data-platform="facebook" onclick="selectPlatform(this)">
      <span class="p-icon">🔵</span>
      <span class="p-name">Facebook</span>
    </button>
    <button class="platform-btn ig" data-platform="instagram" onclick="selectPlatform(this)">
      <span class="p-icon">📸</span>
      <span class="p-name">Instagram</span>
    </button>
    <button class="platform-btn tt" data-platform="tiktok" onclick="selectPlatform(this)">
      <span class="p-icon">🎵</span>
      <span class="p-name">TikTok</span>
    </button>
    <button class="platform-btn zl" data-platform="zalo" onclick="selectPlatform(this)">
      <span class="p-icon">💬</span>
      <span class="p-name">Zalo</span>
    </button>
  </div>

  <div class="btn-row">
    <button class="btn btn-paste" onclick="pasteLink()">📋 Dán</button>
    <button class="btn btn-convert" id="btnConvert" onclick="convertLink()">⚡ Chuyển đổi</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-wrap" id="resultWrap">
    <div class="result-box" id="resultBox"></div>
    <div class="action-row">
      <button class="btn btn-copy" onclick="copyLink()">📋 Sao chép link</button>
      <button class="btn btn-open" onclick="openLink()">🛒 Mở Shopee</button>
    </div>
  </div>

  <div class="tip">
    <strong>Cách dùng:</strong> Dán link Shopee (kể cả link rút gọn shp.ee), chọn nền tảng, nhấn <strong>Chuyển đổi</strong> — mua hàng qua link đó để nhận voucher độc quyền.
  </div>
</div>
<footer>Thảo Thỏ - Deal Shopee</footer>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDEqqAjF-vz9QJ6815etGtssom0QcEU2hk",
    authDomain: "thaotho-shopee.firebaseapp.com",
    projectId: "thaotho-shopee",
    storageBucket: "thaotho-shopee.firebasestorage.app",
    messagingSenderId: "506824479928",
    appId: "1:506824479928:web:966ae2c83006182f0ad04d"
  });
  const db = firebase.firestore();

  const GAS_PROXY = 'https://script.google.com/macros/s/AKfycbz5pLKH3qeVZntGG0GxifsvljZ0itszf9KKfnunxFMybaeh6-Gk60vvHiRspZf-zbBQEA/exec';
  const URL_RX = /(https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/[^\s]*)?/gi;
  let _platform = 'facebook';

  function selectPlatform(el) {
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    _platform = el.dataset.platform;
  }

  function _rand(n) {
    let s = '';
    while (s.length < n) s += Math.random().toString(36).slice(2);
    return s.slice(0, n);
  }

  function _xu(text) {
    const m = (text || '').match(URL_RX) || [];
    const f = m.find(u => /shopee|shp\.ee|shope\.ee/i.test(u));
    if (!f) return null;
    return f.startsWith('http') ? f : 'https://' + f;
  }

  function buildLink(url, platform) {
    try {
      const u = new URL(url);
      switch (platform) {
        case 'facebook':
          u.searchParams.set('smtt', '0.0.3');
          u.searchParams.set('fbclid', _rand(20));
          break;
        case 'instagram':
          u.searchParams.set('smtt', '0.0.9');
          u.searchParams.set('igshid', _rand(20));
          break;
        case 'tiktok':
          u.searchParams.set('smtt', '0.0.7');
          u.searchParams.set('ttclid', _rand(20));
          break;
        case 'zalo':
          u.searchParams.set('smtt', '0.0.5');
          break;
      }
      return u.toString();
    } catch {
      const sep = url.includes('?') ? '&' : '?';
      const smttMap = {facebook:'0.0.3', instagram:'0.0.9', tiktok:'0.0.7', zalo:'0.0.5'};
      let link = url + sep + 'smtt=' + smttMap[platform];
      if (platform === 'facebook')  link += '&fbclid=' + _rand(20);
      if (platform === 'instagram') link += '&igshid=' + _rand(20);
      if (platform === 'tiktok')    link += '&ttclid=' + _rand(20);
      return link;
    }
  }

  function isShortLink(url) {
    return /shp\.ee|vn\.shp\.ee/i.test(url) && !/shopee\.vn\//i.test(url);
  }

  async function resolveUrl(url) {
    const abort = ms => { const c = new AbortController(); setTimeout(() => c.abort(), ms); return c; };
    try {
      const c = abort(9000);
      const r = await fetch(GAS_PROXY + '?url=' + encodeURIComponent(url), {signal: c.signal});
      const d = await r.json();
      if (d.url && /shopee\.vn\//i.test(d.url)) return d.url;
    } catch {}
    try {
      const c = abort(6000);
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), {signal: c.signal});
      const d = await r.json();
      const fu = d.status && d.status.url;
      if (fu && fu !== url && /shopee\.vn\//i.test(fu) && !/\/(mall|error|login)($|\/)/i.test(fu)) return fu;
    } catch {}
    return null;
  }

  async function logConversion(origin, link, platform) {
    try {
      await db.collection('conversions').add({
        time: firebase.firestore.FieldValue.serverTimestamp(),
        origin, affiliate: link, channel: platform,
        orderCode: '', commission: '', bankAccount: '', paymentStatus: 'unpaid'
      });
    } catch(e) { console.warn('Log error:', e); }
  }

  async function pasteLink() {
    try {
      const t = await navigator.clipboard.readText();
      document.getElementById('inputLink').value = t;
    } catch {
      document.getElementById('inputLink').focus();
      showToast('Nhấn Ctrl+V để dán link');
    }
  }

  async function convertLink() {
    const text = document.getElementById('inputLink').value.trim();
    const err  = document.getElementById('errorMsg');
    const res  = document.getElementById('resultWrap');
    const btn  = document.getElementById('btnConvert');
    err.classList.remove('show');
    res.classList.remove('show');

    if (!text) {
      err.textContent = '⚠️ Vui lòng dán link Shopee trước.';
      err.classList.add('show'); return;
    }
    let url = _xu(text);
    if (!url) {
      err.textContent = '⚠️ Không tìm thấy link Shopee hợp lệ.';
      err.classList.add('show'); return;
    }

    if (isShortLink(url)) {
      btn.textContent = '⏳ Đang xử lý...';
      btn.disabled = true;
      const resolved = await resolveUrl(url);
      btn.textContent = '⚡ Chuyển đổi';
      btn.disabled = false;
      if (!resolved) {
        err.textContent = '⚠️ Không thể mở link rút gọn này. Thử dán link đầy đủ shopee.vn.';
        err.classList.add('show'); return;
      }
      url = resolved;
    }

    const link = buildLink(url, _platform);
    document.getElementById('resultBox').textContent = link;
    res.classList.add('show');
    window._L = link;
    logConversion(url, link, _platform);
  }

  function copyLink() {
    if (!window._L) return;
    navigator.clipboard.writeText(window._L)
      .then(() => showToast('✅ Đã sao chép!'))
      .catch(() => {
        const el = document.getElementById('resultBox');
        const r = document.createRange(); r.selectNode(el);
        window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
        document.execCommand('copy'); showToast('✅ Đã sao chép!');
      });
  }

  function openLink() { if (window._L) window.open(window._L, '_blank'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('inputLink').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); convertLink(); }
  });
</script>
</body>
</html>
