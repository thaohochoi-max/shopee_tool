<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thảo Thỏ - Deal Shopee</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #0d0d0d; --dark2: #141414; --dark3: #1c1c1c; --dark4: #252525;
      --text: #e8e8e8; --text2: #aaa;
      --orange: #ee4d2d; --orange2: #d63c1e;
      --green: #22c55e; --gold: #f5c842; --radius: 14px;
    }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--dark); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px 16px;
    }
    .card {
      background: var(--dark2); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 36px 32px;
      width: 100%; max-width: 520px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-icon {
      width: 44px; height: 44px; background: var(--orange);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
    }
    .logo-text h1 { font-size: 1.2rem; font-weight: 800; }
    .logo-text p  { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
    textarea {
      width: 100%; background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.09); border-radius: var(--radius);
      padding: 14px 16px; color: var(--text); font-family: inherit;
      font-size: 0.9rem; line-height: 1.5; resize: none; height: 96px;
      transition: border-color 0.2s; outline: none; margin-bottom: 12px;
    }
    textarea:focus { border-color: var(--orange); }
    textarea::placeholder { color: var(--text2); opacity: 0.6; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn {
      flex: 1; padding: 12px 14px; border-radius: 10px; border: none;
      cursor: pointer; font-family: inherit; font-size: 0.88rem; font-weight: 700;
      transition: all 0.18s; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .btn-paste {
      background: var(--dark4); color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      flex: 0 0 auto; padding: 12px 18px;
    }
    .btn-paste:hover { background: #2e2e2e; }
    .btn-convert { background: var(--orange); color: #fff; }
    .btn-convert:hover { background: var(--orange2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(238,77,45,0.3); }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 12px 16px; color: #f87171;
      font-size: 0.85rem; margin-bottom: 14px; display: none;
    }
    .error-msg.show { display: block; }
    .result-wrap { display: none; }
    .result-wrap.show { display: block; }
    .action-row { display: flex; gap: 10px; }
    .btn-copy { background: var(--green); color: #fff; }
    .btn-copy:hover { background: #16a34a; }
    .btn-open { background: var(--orange); color: #fff; }
    .btn-open:hover { background: var(--orange2); }
    .name-wrap {
      display: none; margin-top: 14px;
      background: rgba(245,200,66,0.06);
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 12px; padding: 14px;
    }
    .name-wrap label {
      display: block; font-size: 0.8rem; color: var(--gold);
      font-weight: 600; margin-bottom: 8px;
    }
    .name-row { display: flex; gap: 8px; }
    .name-input {
      flex: 1; background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      padding: 10px 12px; color: var(--text); font-family: inherit;
      font-size: 0.88rem; outline: none; transition: border-color 0.2s;
    }
    .name-input:focus { border-color: var(--gold); }
    .btn-save {
      flex: 0 0 auto; background: var(--gold); color: #000;
      padding: 10px 18px; border-radius: 8px; font-weight: 700;
      font-size: 0.85rem; border: none; cursor: pointer;
      font-family: inherit;
    }
    .btn-save:hover { background: #e0b830; }
    .channel-row {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .btn-ch {
      flex: 1; padding: 9px 10px; border-radius: 9px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: var(--dark3); color: var(--text2);
      font-family: inherit; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.18s; display: flex;
      align-items: center; justify-content: center; gap: 6px;
    }
    .btn-ch.active-fb  { background: #1877f2; border-color: #1877f2; color: #fff; }
    .btn-ch.active-ig  { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); border-color: #e6683c; color: #fff; }
    .tip {
      margin-top: 20px; padding: 12px 16px;
      background: rgba(245,200,66,0.05); border: 1px solid rgba(245,200,66,0.12);
      border-radius: 10px; font-size: 0.79rem; color: var(--text2); line-height: 1.7;
    }
    .tip strong { color: var(--gold); }
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green); color: #fff; padding: 12px 24px;
      border-radius: 50px; font-weight: 600; font-size: 0.9rem;
      transition: transform 0.3s ease; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    footer { margin-top: 20px; font-size: 0.72rem; color: var(--text2); text-align: center; opacity: 0.4; }
    @media (max-width: 400px) { .card { padding: 22px 14px; } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛍️</div>
    <div class="logo-text">
      <h1>Thảo Thỏ - Deal Shopee</h1>
      <p>Dán link → nhận cashback &amp; voucher</p>
    </div>
  </div>
  <div class="channel-row">
    <button class="btn-ch active-fb" id="chFb" onclick="setChannel('facebook')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.5c-1.5 0-1.96.93-1.96 1.89v2.26h3.32l-.53 3.5h-2.8V24C19.62 23.1 24 18.1 24 12.07z"/></svg>
      Facebook
    </button>
    <button class="btn-ch" id="chIg" onclick="setChannel('instagram')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      Instagram
    </button>
  </div>
  <textarea id="inputLink" placeholder="Dán link Shopee vào đây...&#10;VD: https://shopee.vn/... hoặc shp.ee/..."></textarea>
  <div class="btn-row">
    <button class="btn btn-paste" onclick="pasteLink()">📋 Dán</button>
    <button class="btn btn-convert" onclick="convertLink()">⚡ Chuyển đổi</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="result-wrap" id="resultWrap">
    <div id="resultBox" style="display:none"></div>
    <div class="action-row">
      <button class="btn btn-copy" onclick="copyLink()">📋 Sao chép link</button>
      <button class="btn btn-open" onclick="openLink()">🛒 Mở Shopee</button>
    </div>
    <div class="name-wrap" id="nameWrap">
      <label>✏️ Nhập tên sản phẩm để lưu vào quản lý:</label>
      <div class="name-row">
        <input id="nameField" class="name-input" type="text"
          placeholder="VD: Áo thun nam form rộng..." />
        <button class="btn-save" onclick="saveName()">Lưu</button>
      </div>
    </div>
  </div>
  <div class="tip">
    <strong>Cách dùng:</strong> Dán link Shopee bất kỳ (kể cả link rút gọn shp.ee), nhấn <strong>Chuyển đổi</strong> — mua hàng qua link đó để nhận cashback và voucher.
  </div>
</div>
<footer>Thảo Thỏ - Deal Shopee</footer>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDEqqAjF-vz9QJ6815etGtssom0QcEU2hk",
    authDomain: "thaotho-shopee.firebaseapp.com",
    projectId: "thaotho-shopee",
    storageBucket: "thaotho-shopee.firebasestorage.app",
    messagingSenderId: "506824479928",
    appId: "1:506824479928:web:966ae2c83006182f0ad04d"
  });
  const db = firebase.firestore();

  const _aid = '17332610461';
  let _sid = 'facebook';
  const URL_RX = /(https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/[^\s]*)?/gi;

  function setChannel(ch) {
    _sid = ch;
    document.getElementById('chFb').className = 'btn-ch' + (ch === 'facebook' ? ' active-fb' : '');
    document.getElementById('chIg').className = 'btn-ch' + (ch === 'instagram' ? ' active-ig' : '');
  }

  function _xu(text) {
    const m = (text || '').match(URL_RX) || [];
    const f = m.find(u => /shopee|shp\.ee|shope\.ee/i.test(u));
    if (!f) return null;
    return f.startsWith('http') ? f : 'https://' + f;
  }

  function _bl(url) {
    return 'https://s.shopee.vn/an_redir'
      + '?origin_link=' + encodeURIComponent(url)
      + '&affiliate_id=' + _aid
      + '&sub_id=' + _sid;
  }

  // Trích tên từ URL đầy đủ shopee.vn/Ten-sp-i.xxx.yyy
  function nameFromUrl(u) {
    try {
      const path = decodeURIComponent(new URL(u).pathname);
      const m = path.match(/\/(.+)-i\.\d+\.\d+/);
      if (m) return m[1].replace(/-/g, ' ').replace(/%[0-9a-f]{2}/gi, ' ').trim();
    } catch {}
    return '';
  }

  // Kiểm tra link có phải URL đầy đủ có tên trong path không
  function isFullProductUrl(url) {
    return /shopee\.vn\/.+-i\.\d+\.\d+/.test(url);
  }

  let _docRef = null;

  async function logConversion(originUrl, affiliateLink, productName) {
    try {
      _docRef = await db.collection('conversions').add({
        time: firebase.firestore.FieldValue.serverTimestamp(),
        origin: originUrl,
        productName: productName,
        affiliate: affiliateLink,
        channel: _sid,
        orderCode: '',
        commission: '',
        bankAccount: '',
        paymentStatus: 'unpaid'
      });
    } catch(e) { console.warn('Log error:', e); }
  }

  async function saveName() {
    const name = document.getElementById('nameField').value.trim();
    if (!name) return;
    if (_docRef) {
      try {
        await _docRef.update({ productName: name });
      } catch(e) { console.warn('saveName error:', e); }
    }
    document.getElementById('nameWrap').style.display = 'none';
    document.getElementById('nameField').value = '';
    showToast('✅ Đã lưu tên sản phẩm!');
  }

  async function pasteLink() {
    try {
      const t = await navigator.clipboard.readText();
      document.getElementById('inputLink').value = t;
    } catch {
      document.getElementById('inputLink').focus();
      showToast('Nhấn Ctrl+V để dán link');
    }
  }

  function convertLink() {
    const text = document.getElementById('inputLink').value.trim();
    const err = document.getElementById('errorMsg');
    const res = document.getElementById('resultWrap');
    err.classList.remove('show');
    res.classList.remove('show');
    document.getElementById('nameWrap').style.display = 'none';
    document.getElementById('nameField').value = '';
    _docRef = null;

    if (!text) {
      err.textContent = '⚠️ Vui lòng dán link Shopee trước.';
      err.classList.add('show');
      return;
    }
    const url = _xu(text);
    if (!url) {
      err.textContent = '⚠️ Không tìm thấy link Shopee hợp lệ.';
      err.classList.add('show');
      return;
    }

    const link = _bl(url);
    document.getElementById('resultBox').textContent = link;
    res.classList.add('show');
    window._L = link;

    // Nếu là link đầy đủ có tên trong URL → trích tên tự động
    // Nếu là link rút gọn (shp.ee, s.shopee.vn/xxx...) → hỏi tên ngay
    const autoName = nameFromUrl(url);
    if (autoName) {
      logConversion(url, link, autoName);
    } else {
      logConversion(url, link, '');
      document.getElementById('nameWrap').style.display = 'block';
      setTimeout(() => document.getElementById('nameField').focus(), 50);
    }
  }

  function copyLink() {
    const link = document.getElementById('resultBox').textContent;
    if (!link) return;
    navigator.clipboard.writeText(link)
      .then(() => showToast('✅ Đã sao chép!'))
      .catch(() => {
        const el = document.getElementById('resultBox');
        const r = document.createRange(); r.selectNode(el);
        window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
        document.execCommand('copy'); showToast('✅ Đã sao chép!');
      });
  }

  function openLink() { if (window._L) window.open(window._L, '_blank'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('inputLink').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); convertLink(); }
  });
  document.getElementById('nameField').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveName();
  });
</script>
</body>
</html>
